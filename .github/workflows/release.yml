name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: enable-banking-mcp-linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: enable-banking-mcp-linux-aarch64
            cross: true

          # ── macOS ──────────────────────────────────────────────────────────
          # macos-14 runner is Apple Silicon (arm64) — native aarch64 build
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: enable-banking-mcp-macos-aarch64

          # macos-13 runner is Intel — native x86_64 build
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: enable-banking-mcp-macos-x86_64

          # ── Windows ────────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: enable-banking-mcp-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ── Linux native deps (cmake for aws-lc-rs, nasm for crypto, OpenSSL) ─
      - name: Install Linux build dependencies
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev cmake nasm golang-go

      # ── macOS (cmake via homebrew; nasm and cmake usually present) ─────────
      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install cmake nasm

      # ── Windows (nasm for aws-lc-rs, choco is available on windows-latest) ─
      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        run: choco install nasm cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
        shell: pwsh

      # ── cross for Linux aarch64 ────────────────────────────────────────────
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      # ── Collect artifact ───────────────────────────────────────────────────
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/enable-banking-mcp ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: copy target\${{ matrix.target }}\release\enable-banking-mcp.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          sha256sum * | tee checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            **macOS / Linux — one-liner:**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/Algiras/enable-banking-mcp/main/install.sh | sh
            ```

            **Manual download:** pick the binary for your platform, then run `install`:

            | Platform | Binary |
            |----------|--------|
            | macOS Apple Silicon | `enable-banking-mcp-macos-aarch64` |
            | macOS Intel | `enable-banking-mcp-macos-x86_64` |
            | Linux x86_64 | `enable-banking-mcp-linux-x86_64` |
            | Linux ARM64 | `enable-banking-mcp-linux-aarch64` |
            | Windows x86_64 | `enable-banking-mcp-windows-x86_64.exe` |

            ```sh
            # Unix
            chmod +x enable-banking-mcp-*
            ./enable-banking-mcp-macos-aarch64 install

            # Windows (PowerShell)
            .\enable-banking-mcp-windows-x86_64.exe install
            ```

            Verify your download with `checksums.txt`.
