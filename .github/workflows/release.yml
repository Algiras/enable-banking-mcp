name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: enable-banking-mcp-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: enable-banking-mcp-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: enable-banking-mcp-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: enable-banking-mcp-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: enable-banking-mcp-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Linux dependencies
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/enable-banking-mcp ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\enable-banking-mcp.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            **macOS / Linux (curl installer):**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/Algiras/enable-banking-mcp/main/install.sh | sh
            ```

            **Manual download:** Pick the binary for your platform below.

            | Platform | Binary |
            |----------|--------|
            | macOS Apple Silicon | `enable-banking-mcp-macos-aarch64` |
            | macOS Intel | `enable-banking-mcp-macos-x86_64` |
            | Linux x86_64 | `enable-banking-mcp-linux-x86_64` |
            | Linux ARM64 | `enable-banking-mcp-linux-aarch64` |
            | Windows x86_64 | `enable-banking-mcp-windows-x86_64.exe` |

            After downloading, run:
            ```sh
            chmod +x enable-banking-mcp-*
            ./enable-banking-mcp-* install
            ```
